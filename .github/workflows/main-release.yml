name: Main CI + Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    name: Validate tests and examples
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run all Go tests with 100% coverage gate
        shell: bash
        run: |
          set -euo pipefail
          go test ./... -coverprofile=coverage.out
          go tool cover -func=coverage.out
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')"
          if [[ "${total}" != "100.0" ]]; then
            echo "Coverage gate failed: expected 100.0, got ${total}"
            exit 1
          fi

      - name: Build examples CLI
        run: go build -o /tmp/metrics-cli ./examples

  release:
    name: Tag and release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute semantic version
        id: version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE:"
          minor_pattern: "feat:"
          search_commit_body: true
          bump_each_commit: false
          version_format: "${major}.${minor}.${patch}"

      - name: Build release description
        shell: bash
        run: |
          set -euo pipefail
          version="v${{ steps.version.outputs.version }}"
          {
            echo "Automated release for ${version}."
            echo
            echo "Validated by CI:"
            echo "- go test ./... -coverprofile=coverage.out (100% required)"
            echo "- go build -o /tmp/metrics-cli ./examples"
          } > RELEASE_NOTES.md

      - name: Create GitHub release and tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
