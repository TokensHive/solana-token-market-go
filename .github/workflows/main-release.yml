name: Main CI + Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    name: Validate tests and mint checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MINT_TEST_TIMEOUT: 180s
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run all Go tests
        run: go test ./...

      - name: Run mint checks and generate benchmark report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          report=".artifacts/BENCHMARK.md"
          {
            echo "# BENCHMARK"
            echo
            echo "Generated on: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo
            echo "## Summary"
            echo
            echo "| Mint | Status | Duration | RPC Calls | API Calls | SDK ms |"
            echo "|---|---|---|---|---|---|"
          } > "${report}"

          mapfile -t MINTS < <(awk 'NF {gsub(/[[:space:]]+/, "", $0); print $0}' .github/mint-tests.txt)
          if [[ "${#MINTS[@]}" -eq 0 ]]; then
            echo "No mint test identifiers configured in .github/mint-tests.txt"
            exit 1
          fi
          failures=0
          total=0

          # Collect per-call detail sections to append after the summary table.
          detail_file=".artifacts/benchmark-details.tmp"
          > "${detail_file}"

          for mint in "${MINTS[@]}"; do
            total=$((total + 1))
            start="$(date +%s)"
            log_file=".artifacts/mint-${mint}.log"
            if go run ./examples -cmd all-methods -mint "${mint}" -debug -timeout "${MINT_TEST_TIMEOUT}" > "${log_file}" 2>&1; then
              status="PASS"
            else
              status="FAIL"
              failures=$((failures + 1))
            fi
            duration="$(( $(date +%s) - start ))s"

            # Parse TELEMETRY block written by the runner.
            rpc_total="-"
            api_total="-"
            sdk_ms="-"
            if grep -q "^TELEMETRY_BEGIN" "${log_file}" 2>/dev/null; then
              total_line="$(sed -n '/^TELEMETRY_BEGIN/,/^TELEMETRY_END/p' "${log_file}" | grep "^TELEMETRY_TOTAL" || true)"
              if [[ -n "${total_line}" ]]; then
                sdk_ms="$(echo "${total_line}"   | grep -o 'duration_ms=[0-9]*' | cut -d= -f2)"
                rpc_total="$(echo "${total_line}" | grep -o ' rpc=[0-9]*'        | grep -o '[0-9]*')"
                api_total="$(echo "${total_line}" | grep -o ' api=[0-9]*'        | grep -o '[0-9]*')"
              fi
            fi

            echo "| \`${mint}\` | ${status} | ${duration} | ${rpc_total} | ${api_total} | ${sdk_ms} |" >> "${report}"

            # Build per-call detail table for this mint.
            {
              echo
              echo "### \`${mint}\` — ${status}"
              echo
              echo "| Call | Status | Duration (ms) | RPC Calls | API Calls |"
              echo "| --- | --- | --- | --- | --- |"
              if grep -q "^TELEMETRY_BEGIN" "${log_file}" 2>/dev/null; then
                while IFS= read -r line; do
                  case "${line}" in
                    op=*)
                      op="$(echo "${line}"  | grep -o 'op=[^ ]*'          | cut -d= -f2)"
                      st="$(echo "${line}"  | grep -o 'status=[^ ]*'      | cut -d= -f2)"
                      ms="$(echo "${line}"  | grep -o 'duration_ms=[0-9]*'| cut -d= -f2)"
                      rpc="$(echo "${line}" | grep -o ' rpc=[0-9]*'       | grep -o '[0-9]*')"
                      api="$(echo "${line}" | grep -o ' api=[0-9]*'       | grep -o '[0-9]*')"
                      echo "| ${op} | ${st} | ${ms} | ${rpc} | ${api} |"
                      ;;
                    TELEMETRY_TOTAL*)
                      ms="$(echo "${line}"  | grep -o 'duration_ms=[0-9]*'| cut -d= -f2)"
                      rpc="$(echo "${line}" | grep -o ' rpc=[0-9]*'       | grep -o '[0-9]*')"
                      api="$(echo "${line}" | grep -o ' api=[0-9]*'       | grep -o '[0-9]*')"
                      echo "| **Total** | — | **${ms}** | **${rpc}** | **${api}** |"
                      ;;
                  esac
                done < <(sed -n '/^TELEMETRY_BEGIN/,/^TELEMETRY_END/p' "${log_file}")
              else
                echo "| _(telemetry unavailable)_ | — | — | — | — |"
              fi
            } >> "${detail_file}"
          done

          {
            echo
            echo "Mint checks failed: ${failures}/${total}"
            echo
            echo "## Per-Call Telemetry"
            cat "${detail_file}"
          } >> "${report}"

          cp "${report}" BENCHMARK.md

          if [[ "${failures}" -gt 0 ]]; then
            echo "One or more mint checks failed."
            exit 1
          fi

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: BENCHMARK.md

      - name: Upload mint logs
        uses: actions/upload-artifact@v4
        with:
          name: mint-check-logs
          path: .artifacts/mint-*.log

  release:
    name: Tag and release
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute semantic version
        id: version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE:"
          minor_pattern: "feat:"
          search_commit_body: true
          bump_each_commit: false
          version_format: "${major}.${minor}.${patch}"

      - name: Download benchmark report
        uses: actions/download-artifact@v4
        with:
          name: benchmark-report
          path: .artifacts

      - name: Build release description
        shell: bash
        run: |
          set -euo pipefail
          version="v${{ steps.version.outputs.version }}"
          {
            echo "Automated release for ${version}."
            echo
            echo "## Mint benchmark results"
            cat .artifacts/BENCHMARK.md
          } > RELEASE_NOTES.md

      - name: Create GitHub release and tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          files: .artifacts/BENCHMARK.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
