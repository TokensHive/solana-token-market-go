name: Main CI + Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    name: Validate tests and mint checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MINT_TEST_TIMEOUT: 180s
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run all Go tests
        run: go test ./...

      - name: Run mint checks and generate benchmark report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          report=".artifacts/BENCHMARK.md"
          {
            echo "# BENCHMARK"
            echo
            echo "Generated on: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo
            echo "| Mint | Status | Duration |"
            echo "|---|---|---|"
          } > "${report}"

          mapfile -t MINTS < <(awk 'NF {gsub(/[[:space:]]+/, "", $0); print $0}' .github/mint-tests.txt)
          if [[ "${#MINTS[@]}" -eq 0 ]]; then
            echo "No mint test identifiers configured in .github/mint-tests.txt"
            exit 1
          fi
          failures=0
          total=0

          for mint in "${MINTS[@]}"; do
            total=$((total + 1))
            start="$(date +%s)"
            log_file=".artifacts/mint-${mint}.log"
            if go run ./examples -cmd all-methods -mint "${mint}" -debug -timeout "${MINT_TEST_TIMEOUT}" > "${log_file}" 2>&1; then
              status="PASS"
            else
              status="FAIL"
              failures=$((failures + 1))
            fi
            duration="$(( $(date +%s) - start ))s"
            echo "| \`${mint}\` | ${status} | ${duration} |" >> "${report}"
          done

          {
            echo
            echo "Mint checks failed: ${failures}/${total}"
          } >> "${report}"

          cp "${report}" BENCHMARK.md

          if [[ "${failures}" -gt 0 ]]; then
            echo "One or more mint checks failed."
            exit 1
          fi

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: BENCHMARK.md

      - name: Upload mint logs
        uses: actions/upload-artifact@v4
        with:
          name: mint-check-logs
          path: .artifacts/mint-*.log

  release:
    name: Tag and release
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute semantic version
        id: version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE:"
          minor_pattern: "feat:"
          search_commit_body: true
          bump_each_commit: false
          version_format: "${major}.${minor}.${patch}"

      - name: Download benchmark report
        uses: actions/download-artifact@v4
        with:
          name: benchmark-report
          path: .artifacts

      - name: Build release description
        shell: bash
        run: |
          set -euo pipefail
          version="v${{ steps.version.outputs.version }}"
          {
            echo "Automated release for ${version}."
            echo
            echo "## Mint benchmark results"
            cat .artifacts/BENCHMARK.md
          } > RELEASE_NOTES.md

      - name: Create GitHub release and tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          files: .artifacts/BENCHMARK.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
